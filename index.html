<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Web Components for shared navbar and footer layout -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
</head>

<body>
    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>

    <!-- our own navbar goes here -->
    <site-navbar></site-navbar>

    <!-- Main content goes here -->
    <!-- This is the welcome on the landing page, with a login/signup button -->
    <div class="mx-auto max-w-5xl px-4">
        <div class="my-10 rounded-2xl border border-slate-200 bg-white px-6 py-10 text-center shadow-sm sm:px-10">
            <img class="mx-auto mb-4 h-14 w-14 rounded object-cover" src="/images/image.jpg" alt="" width="72"
                height="57" />

            <h1 class="text-3xl font-bold tracking-tight text-slate-900 sm:text-5xl">
                Welcome to ElmoHikes, <span id="name-goes-here">my friend!</span>
            </h1>

            <div class="mx-auto mt-6 max-w-2xl">
                <p class="mb-4 text-lg text-slate-600">
                    Join a community of hikers looking for new places to explore.
                </p>

                <h2 class="text-2xl font-semibold text-slate-800">
                    The view is better, together.
                </h2>

                <div class="mt-6 flex justify-center">
                    <button onclick="window.location.href='login.html'" type="button"
                        class="rounded-lg bg-cyan-600 px-5 py-3 text-lg font-medium text-white hover:bg-cyan-700 focus:outline-none focus:ring-2 focus:ring-cyan-500">
                        Login/Signup
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- our own footer goes here -->
    <site-footer></site-footer>

    <!---------------------------------------------->
    <!-- Your own JavaScript scripts go here      -->
    <!---------------------------------------------->
    <script type="module" src="/src/app.js"></script>
